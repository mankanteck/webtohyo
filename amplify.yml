version: 1
backend:
  phases:
    build:
      commands:
        - npm ci
        - NODE_OPTIONS='--import ./amplify/tsx-global-register.mjs' npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "=== ENV CHECK === MASK_NAMES=${MASK_NAMES}"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
