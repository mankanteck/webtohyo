AWSTemplateFormatVersion: "2010-09-09"
Description: "webtohyo 電子投票システム DynamoDB テーブル"

Parameters:
  Env:
    Type: String
    Default: prod
    AllowedValues: [prod, stg, dev]
    Description: 環境名（テーブル名の suffix になります）

Resources:
  # ── Condo テーブル ────────────────────────────────────────────────────────────
  CondoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webtohyo-condos-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: ownerUserId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # ログインユーザーのCondoを取得するために使用
        - IndexName: ownerUserId-index
          KeySchema:
            - AttributeName: ownerUserId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: webtohyo
        - Key: Env
          Value: !Ref Env

  # ── Unit テーブル ────────────────────────────────────────────────────────────
  UnitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webtohyo-units-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: condoId
          AttributeType: S
        - AttributeName: accessToken
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # condoId で部屋一覧を取得するために使用
        - IndexName: condoId-index
          KeySchema:
            - AttributeName: condoId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # QRコードのトークンから本人確認するために使用
        - IndexName: accessToken-index
          KeySchema:
            - AttributeName: accessToken
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: webtohyo
        - Key: Env
          Value: !Ref Env

  # ── Agenda テーブル ──────────────────────────────────────────────────────────
  AgendaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webtohyo-agendas-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: condoId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: condoId-index
          KeySchema:
            - AttributeName: condoId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: webtohyo
        - Key: Env
          Value: !Ref Env

  # ── Vote テーブル ────────────────────────────────────────────────────────────
  VoteTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webtohyo-votes-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: unitId
          AttributeType: S
        - AttributeName: agendaId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # 部屋ごとの投票内容照会に使用
        - IndexName: unitId-index
          KeySchema:
            - AttributeName: unitId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        # 議案ごとの集計に使用
        - IndexName: agendaId-index
          KeySchema:
            - AttributeName: agendaId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: webtohyo
        - Key: Env
          Value: !Ref Env

Outputs:
  CondoTableName:
    Value: !Ref CondoTable
    Export:
      Name: !Sub "webtohyo-condos-${Env}"
  UnitTableName:
    Value: !Ref UnitTable
    Export:
      Name: !Sub "webtohyo-units-${Env}"
  AgendaTableName:
    Value: !Ref AgendaTable
    Export:
      Name: !Sub "webtohyo-agendas-${Env}"
  VoteTableName:
    Value: !Ref VoteTable
    Export:
      Name: !Sub "webtohyo-votes-${Env}"
